name: Refresh Popular Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  refresh-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Refresh analytics data
        env:
          GOOGLE_ANALYTICS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_ANALYTICS_CREDENTIALS_JSON }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: npm run refresh:popular

      - name: Commit updated analytics files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/analytics.json _data/analytics_month.json
          git diff --cached --quiet || git commit -m "chore(analytics): refresh popularity data"
          git push
